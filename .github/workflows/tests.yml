name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests
      env:
        # Provide dummy environment variables so configuration loads successfully in test mode
        META_VERIFY_TOKEN: "dummy_verify_token"
        META_WHATSAPP_TOKEN: "dummy_whatsapp_token"
        META_PHONE_NUMBER_ID: "dummy_phone_id"
        META_APP_SECRET: "dummy_app_secret"
        SUPABASE_URL: "https://dummy.supabase.co"
        SUPABASE_SERVICE_KEY: "dummy_service_key"
      run: |
        PYTHONPATH=. pytest -p no:warnings
